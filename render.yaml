services:
  - type: web
    name: face-recognition-attendance
    env: python
    region: frankfurt # Can be frankfurt, oregon, ohio, singapore
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: PIP_NO_CACHE_DIR
        value: "1" # Saves RAM during build on Render free tier
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "3306"
